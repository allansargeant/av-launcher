# flock — BirdDog Play NDI/SRT decoder fleet manager (Rust).
# https://github.com/allansargeant/flock
#
# Run the launcher against this app with:
#   AV_LAUNCHER_CONFIG=launchers/flock.toml npm run tauri dev
# (or copy this file over src-tauri/launcher.toml).
#
# flock specifics that differ from srt-router:
#   * it takes the config path as a POSITIONAL arg (`flock <config>`), not --config
#   * its web bind is the TOP-LEVEL `bind` key, not a nested `web.bind`

[app]
name = "flock"
command = "/Users/allansargeant/Projects/flock/target/debug/flock"
args = ["{config}"]
url = "http://{host}:{port}/"
default_port = 8080
# Run from the repo root so relative paths (data/registry.json) resolve.
cwd = "/Users/allansargeant/Projects/flock"

[inject]
mode = "configfile"

[inject.configfile]
template = "/Users/allansargeant/Projects/flock/config/example.toml"
set_key = "bind"
value = "{host}:{port}"

# Palette mirrored from flock's web UI (dark + emerald accent).
[app.theme]
bg = "#14161a"
panel = "#1b1e24"
"panel-2" = "#21252c"
border = "#2c313a"
text = "#e6e8eb"
muted = "#9aa1ac"
dim = "#6b7280"
accent = "#1fae63"
"accent-soft" = "#15271d"
good = "#1fae63"
