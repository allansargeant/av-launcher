# RFutils — RF coordination + wireless-mic monitoring suite (Node/TS).
# Local-only project. Demonstrates ENV injection (no config-file patching).
#
#   AV_LAUNCHER_CONFIG=launchers/rfutils.toml npm run tauri dev
#
# Build it first:  (cd ~/Projects/RFutils && npm run build)

[app]
name = "RFutils"
command = "node"
args = ["/Users/allansargeant/Projects/RFutils/packages/server/dist/index.js"]
url = "http://{host}:{port}/"
default_port = 8420
cwd = "/Users/allansargeant/Projects/RFutils/packages/server"

[inject]
mode = "env"

[inject.env]
RFUTILS_SERVER_PORT = "{port}"
RFUTILS_HOST = "{host}"

# Palette mirrored from RFutils' web UI (dark + royal-blue accent).
[app.theme]
bg = "#12141a"
panel = "#1a1d26"
"panel-2" = "#232733"
border = "#2a2e3a"
text = "#e8eaf0"
muted = "#9aa1b2"
dim = "#6b7080"
accent = "#6ea8fe"
"accent-soft" = "#172138"
good = "#3fae5a"
